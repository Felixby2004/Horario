<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo blanco -->
  <rect width="200" height="200" fill="white"/>
  
  <!-- Escudo exterior (marco rojo y blanco) -->
  <path d="M 100 20 L 160 60 L 160 140 Q 100 180 100 180 Q 100 180 40 140 L 40 60 Z" 
        fill="none" stroke="#DC143C" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Escudo interior blanco -->
  <path d="M 100 28 L 152 62 L 152 138 Q 100 172 100 172 Q 100 172 48 138 L 48 62 Z" 
        fill="white" stroke="#DC143C" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Franja azul central -->
  <rect x="85" y="50" width="30" height="110" fill="#003f7f" rx="2"/>
  
  <!-- Cruces doradas en las esquinas del escudo -->
  <g fill="#FFD700">
    <!-- Cruz superior izquierda -->
    <rect x="58" y="75" width="3" height="15" transform="rotate(45 59.5 82.5)"/>
    <rect x="52" y="75" width="15" height="3" transform="rotate(45 59.5 76.5)"/>
    
    <!-- Cruz superior derecha -->
    <rect x="138" y="75" width="3" height="15" transform="rotate(45 139.5 82.5)"/>
    <rect x="132" y="75" width="15" height="3" transform="rotate(45 139.5 76.5)"/>
  </g>
  
  <!-- Águilas estilizadas (símbolos dorados) -->
  <g fill="#FFD700" opacity="0.8">
    <!-- Ala izquierda -->
    <path d="M 70 90 Q 60 88 55 95 Q 60 92 70 95" fill="#FFD700"/>
    <!-- Ala derecha -->
    <path d="M 130 90 Q 140 88 145 95 Q 140 92 130 95" fill="#FFD700"/>
    <!-- Centro -->
    <circle cx="100" cy="100" r="4" fill="#FFD700"/>
  </g>
  
  <!-- Texto "UNT" -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="18" font-weight="bold" 
        fill="#003f7f" text-anchor="middle">UNT</text>
</svg>